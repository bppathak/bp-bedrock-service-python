apiVersion: batch/v1
kind: Job
metadata:
  name: localstack-init
  namespace: bp-bedrock
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: init
        image: localstack/localstack:3.0.2
        env:
        - name: AWS_ACCESS_KEY_ID
          value: test
        - name: AWS_SECRET_ACCESS_KEY
          value: test
        command:
        - sh
        - -c
        - |
          until curl -s http://localstack:4566/_localstack/health > /dev/null; do
            echo "Waiting for LocalStack..."
            sleep 2
          done

          echo "Creating DynamoDB table..."
          aws dynamodb create-table \
            --table-name bp-submissions \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localstack:4566 \
            --region eu-west-2

          echo "Creating S3 bucket..."  
          aws --endpoint-url=http://localstack:4566 s3api create-bucket \
            --bucket bp-submission-files \
            --region eu-west-2 \
            --create-bucket-configuration LocationConstraint=eu-west-2          

          echo "Creating SQS..."  
          aws --endpoint-url=http://localstack:4566 \
            --region eu-west-2 \
            sqs create-queue \
            --queue-name bp-submission-conversion-queue || true