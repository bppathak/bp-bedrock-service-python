name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-test-push:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------- BACKEND TEST ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Backend Dependencies
        working-directory: backend_python
        run: poetry install

      - name: Run Backend Tests
        working-directory: backend_python
        run: poetry run pytest

      # ---------- FRONTEND TEST ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: frontend_react
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend_react
        run: npm test -- --watchAll=false

      # ---------- DOCKER LOGIN ----------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------- BUILD & PUSH BACKEND ----------
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend_python
          push: true
          tags: bp-bedrock-hub/backend:latest

      # ---------- BUILD & PUSH FRONTEND ----------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend_react
          push: true
          tags: bp-bedrock-hub/frontend:latest

  deploy:

    needs: build-test-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------- SET KUBECONFIG ----------
      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      # ---------- DEPLOY TO KUBERNETES ----------
      - name: Deploy Backend & Frontend
        run: |
          kubectl apply -f k8s/

      # ---------- ROLLING UPDATE ----------
      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment backend -n bp-bedrock-service
          kubectl rollout restart deployment frontend -n bp-bedrock-service