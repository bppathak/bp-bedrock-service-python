apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bp-bedrock-ingress
  namespace: bp-bedrock
  annotations:
    # nginx ingress rewrite (optional). Remove or modify if using another ingress controller.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: example.com  # replace with your domain or remove to use default
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173